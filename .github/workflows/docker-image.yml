name: Simple Pipeline
on: 
  push:
    branches:
      - master
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.PASSWORD_DOCKER }}

      - name: Build the docker image 
        run: docker build -t ${{ secrets.DOCKER_USER }}/node-app . 

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USER }}/node-app:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy using SSM
        run: |
          aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "node app deployment" \
          --parameters commands='[
            "docker pull ${{ secrets.DOCKER_USER }}/node-app",
            "docker run -d -p 80:80 --name node-app ${{ secrets.DOCKER_USER }}/node-app"
          ]' \
          --region ${{ secrets.AWS_REGION }}

          

      
