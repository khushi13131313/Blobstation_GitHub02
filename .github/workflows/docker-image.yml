name: Simple Pipeline
on: 
  push:
    branches:
      - master
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USER }}
      #     password: ${{ secrets.PASSWORD_DOCKER }}

      - name: Build the docker image 
        run: docker build -t ${{ secrets.DOCKER_USER }}/node-app:latest . 

      - name: Download Trivy HTML template
        run: |
         mkdir -p trivy-template
         curl -L https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl -o trivy-template/html.tpl
         
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USER }}/node-app:latest
          # For template format 
          format: 'template'
          template: '@trivy-template/html.tpl'
          output: 'trivy-report.html'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          
      - name: Upload trivy report 
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.html
        

